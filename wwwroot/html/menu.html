<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Kreutzträger WebApp</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel='icon' type='image/x-icon' href='/favicon.ico'>
    <link rel='stylesheet' href='../css/style.css'>
    <script type="module" src='../js/script.js'></script>
</head>
<body>
    <h1>Kreutzträger WebApp</h1>

    <div id="logincard">
        <div id="loginheader" onclick="user.checkLoginStatus();">Login</div>
        <input type="text" id="username" placeholder="Benutzername" value="Admin"><br />
        <input type="password" id="password" placeholder="Passwort" value="Admin" onchange="user.login()"><br />
        <button onclick="user.login()">Login</button><button onclick="user.logout()">Logout</button>
    </div>

    <h3>Systemmenü</h3>
    <ul>
        <li><a class="menuitem" href="/tag/all">Datenpunkte</a></li>
        <li><a class="menuitem" href="/user">Benutzerverwaltung</a></li>
        <li><a class="menuitem" href="/soll/history">Sollwertänderungen</a></li>
        <li><a class="menuitem" href="/log">Server Log</a></li>
        <li><a class="menuitem" href="/excel">Datenexport</a></li>
    </ul>

    <h3>Demo</h3>
    <ul>
        <li><a class="menuitem" href="/source" disabled>Datenquellen</a></li>
        <li><a class="menuitem" href="/db/list">Datenbanken</a></li>
        <li><a class="menuitem" href="/tag/failures">Letzte Lesefehler</a></li>
        <li><a class="menuitem" href="/soll/1">Demo Sollwertfenster</a></li>

        <li><a class="menuitem" id="rawjsonlink" href="#">Demo Json Rohdaten abfragen</a></li>
        <li><a class="menuitem" href="/chart">Demo Kurvendarstellung</a></li>
    </ul>

    <script>
        function setDemoLink() {
            //nur Demo. function wieder löschen.
            const start = new Date();
            start.setHours(0, 0, 0);
            start.toISOString().replace(" ", "%3A")

            const end = new Date();
            end.toISOString().replace(" ", "%3A");

            document.getElementById('rawjsonlink').setAttribute('href', `/db?tagnames=A01_DB10_DBW2%2CA01_DB10_DBW4%2CA01_DB10_DBW6&start=${start}&end=${end}`)
        }

        setDemoLink(); //nur Demo
    </script>

    <style>
        #logincard {
            position: absolute;
            right: 11rem;
            top: 3rem;
            width: 15rem;
        }

        @media (max-width: 1000px) {
            #logincard {
                position: relative;
                left: 2.5rem;
                top: 0;
            }
        }

        #logincard button {
            width: 50%;
            background-color: white;
            font-size: 1.1rem;
        }

        #logincard input {
            width: 100%
        }

        #loginheader {
            padding: 0.5rem 0.1rem;
            color: white;
            font-size: 1.3rem;
        }
    </style>

</body>
</html>
