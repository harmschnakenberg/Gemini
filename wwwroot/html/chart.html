<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Demo Kurve</title>
    <link rel='icon' type='image/x-icon' href='/favicon.ico'>
    <link rel='stylesheet' href='../css/style.css'>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@^2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@^1"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script> <!-- für PAN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-zoom/2.2.0/chartjs-plugin-zoom.min.js" integrity="sha512-FRGbE3pigbYamZnw4+uT4t63+QJOfg4MXSgzPn2t8AWg9ofmFvZ/0Z37ZpCawjfXLBSVX2p2CncsmUH2hzsgJg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script type="module" src='../js/script.js'></script>
</head>
<body>
    <h1>Demo Kurvendarstellung</h1>
    <p>Beispiel Kurve</p>

    <dialog id="waitforserver">
        <p><span class="loader">Daten werden vom Server angefordert </span></p>
        <button commandfor="waitforserver" command="close">Schließen</button>
    </dialog>

    <div style="position:absolute; right:0.5rem; top:3.5rem;">
        <input type="hidden" id="hour" data-name='A01_DB10_DBW2' />
        <input type="hidden" id="min" data-name='A01_DB10_DBW4' />
        <input type="hidden" id="sec" data-name='A01_DB10_DBW6' />
        SPS-Zeit <span id="time"></span>
        <script>
            function clock() {
                h = document.getElementById('hour').value;
                m = document.getElementById('min').value;
                s = document.getElementById('sec').value;
                document.getElementById('time').innerHTML = h.padStart(2, "0") + ':' + m.padStart(2, "0") + ':' + s.padStart(2, "0");
            }
            window.setInterval(clock, 1000);
        </script>
    </div>

    <canvas id="myChart1" class="chart" style="background-color: rgb(70, 70, 70); min-width: 50vw; max-width: 90vw; height: 30vh; max-height: 40vh; "></canvas>
    <div class="container controls" style="max-width: fit-content; margin-left: auto; margin-right: auto;">
        <div class="myButton" id="chartTimespan"></div>
        <input type="datetime-local" id="start" name="start" onfocusout="loadAllCharts();">
        <input type="datetime-local" id="end" name="end" onfocusout="loadAllCharts();">
        <button class="myButton" onclick="chart.setDatesHours('start', 'end', 8);loadAllCharts();"><i class="material-icons">schedule</i>8</button>
        <button class="myButton" onclick="chart.setDatesHours('start', 'end',24);loadAllCharts();"><i class="material-icons">schedule</i>24</button>
        <select class='myButton' id='interval' onchange="loadAllCharts();">
            <option value='0' selected>&#x26C1;</option>
            <option value='1'>&#x26C0;</option>
        </select>
        <button class="myButton" onclick="exp.export('start', 'end', 0, chart.getAllTags([tags1,tags2]));"><i class="material-icons">save</i></button>
        <button class="myButton" onclick="chart.zoom(['myChart1', 'myChart2'], 1.2);"><i class="material-icons">zoom_in</i></button>
        <button class="myButton" onclick="chart.zoom(['myChart1', 'myChart2'], 0.8);"><i class="material-icons">zoom_out</i></button>
        <button class="myButton" onclick="chart.resetZoom(['myChart1', 'myChart2'])"><i class="material-icons">center_focus_weak</i></button>
        <button class="myButton" onclick="chart.panX(['myChart1', 'myChart2'], 100);"><i class="material-icons">arrow_left</i></button>
        <button class="myButton" onclick="chart.panX(['myChart1', 'myChart2'], -100);"><i class="material-icons">arrow_right</i></button>
        <!-- <button class="myButton" onclick="toggleStatusChart('myChart2', tags2)"><i style="color:red;" class="material-icons">legend_toggle</i></button> -->
    </div>
    <canvas id="myChart2" class="chart" style="background-color: rgb(70, 70, 70); min-width: 50vw; max-width: 90vw; height: 30vh; max-height: 40vh; "></canvas>

    <div id="progressContainer" style="position: absolute; top:10px; left: 40%; margin: auto;"></div>

    <div id="rawDataLinks" style="position:sticky; bottom:0.5rem; left:0.5rem;"></div>

    <script type="module">
        chart.initChart('myChart1', false);
        chart.initChart('myChart2', true);
        if (!chart.getTimeParams())
            chart.setDatesHours('start', 'end', 8);
        loadAllCharts();
    </script>
    <script>

        const tags1 = new Map(); 
        const tags2 = new Map();

        function loadAllCharts() {
            if (chart.checkDuration('start', 'end', 'chartTimespan')) {
                chart.loadChart('myChart1', 'start', 'end', 'interval', tags1);
                chart.loadChart('myChart2', 'start', 'end', 'interval', tags2);
                chart.setTimeParams();
            }
        }
    </script>

</body>
</html>
