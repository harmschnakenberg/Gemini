<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" style="background-color:rgb(60,60,60);">
   <defs>
            <!-- SVG-Vorlagen -->
            
            <g id="istwert">
                <rect width="80" height="18" fill="black" />
                <text font-family="sans-serif" font-size="12">
                    <tspan y="14" x="58" fill="white" class="valuedisplay" text-anchor="end">0,0</tspan>
                    <tspan y="14" x="58" fill="white" class="unitdisplay">°C</tspan>
                </text>
            </g>

            <g id="ventilator">
                <circle r="20" class="valuedisplay" fill="grey" style="stroke:var(--borderColorDark);stroke-width:1;" />
                <ellipse rx="9" ry="4" cx="-9" style="fill:var(--borderColorLight);stroke:var(--borderColorDark);" />
                <ellipse rx="9" ry="4" cx="9" style="fill:var(--borderColorLight);stroke:var(--borderColorDark);" />
            </g>

            <g id="pumpe">
                <circle r="20" class="valuedisplay" fill="grey" style="stroke:var(--borderColorLight);" />
                <path d="M-18 0 L0 17 L18 0" style="fill:none;stroke:var(--borderColorLight);stroke-width:2" />
            </g>

            <g id="verdichter">
                <circle r="30" class="valuedisplay" fill="grey" style="stroke:var(--borderColorLight);" />
                <path d="M-28 0 L-8 27 M8 27 L28 0" style="fill:none;stroke:var(--borderColorLight);stroke-width:2"/>
            </g>

            <g id="vessel">
                <linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop class="valuedisplay" offset="70%" style="stop-color:grey;stop-opacity:1" />
                    <stop class="valuedisplay" offset="70%" style="stop-color:rgb(0,255,0);stop-opacity:1" />
                </linearGradient>
                <rect rx="25" ry="50" width="300" height="100" style="stroke:var(--borderColorLight);" fill="url(#grad)" />
            </g>

            <g id="ventil">
                <path d="M0 0 L30 20 L 30 0 L0 20 Z M15 10 L15 0" style="fill: grey; stroke: var(--borderColorLight);" transform="translate(-15 -10)" class="valuedisplay" />   
            </g>

            <g id="antrieb" >
                <circle r="12" cx="0" cy="-20" style="fill: grey; stroke: var(--borderColorLight);" class="valuedisplay" />
                <text x="-7" y="-14" style="font-family:Sans,Arial;">M</text>
            </g>

           <g id="antrieb-r" >
             <circle r="12" cx="20" cy="0" style="fill: grey; stroke: var(--borderColorLight);"  class="valuedisplay" />
             <text x="13" y="6" style="font-family:Sans,Arial;">M</text>
           </g>

           <g id="mv" >
             <path d="M-15 -10 L15 10 L15 -10 L-15 10 Z M0 0 L0 -12   M-8 -12 L-8 -28 L8 -28 L8 -12 L-8 -12 M-8 -12 L8 -28 Z" style="fill:grey;stroke: var(--borderColorLight);" class="valuedisplay" />       
           </g>

       
          <!-- ohne Animation -->
     <g id="pfeil">
       <path d="M0 -5 L5 5 L-5 5 Z"/>
     </g>
     
        </defs>

  <use x="100" y="100" href="#istwert"></use>
  <circle cx="100" cy="100" r="2" fill="tomato" />
  
  <use x="200" y="100" href="#ventilator"></use>
  <circle cx="200" cy="100" r="2" fill="tomato" />
  
  <use x="300" y="100" href="#pumpe"></use>
  <circle cx="300" cy="100" r="2" fill="tomato" />
  
  <use x="400" y="100" href="#verdichter"></use>
  <circle cx="400" cy="100" r="2" fill="tomato" />
  
  <use x="500" y="100" href="#ventil"></use>
  <circle cx="500" cy="100" r="2" fill="tomato" />
    
  <use x="700" y="100" href="#antrieb"></use>
  <circle cx="700" cy="100" r="2" fill="tomato" />

  <use x="800" y="100" href="#antrieb-r"></use>
  <circle cx="800" cy="100" r="2" fill="tomato" />
  
  <use x="900" y="100" href="#mv"></use>
  <circle cx="900" cy="100" r="2" fill="tomato" />

  <use x="1000" y="100" href="#pfeil"></use>
  <circle cx="1000" cy="100" r="1" fill="tomato" />





  <use x="100" y="200" href="#vessel"></use>
  <circle cx="100" cy="200" r="2" fill="tomato" />

  <use x="500" y="400" href="#ventil-h"></use>
  <circle cx="500" cy="400" r="2" fill="tomato" />
  <use x="500" y="400" href="#antrieb-o"></use>
  <circle cx="500" cy="400" r="2" fill="tomato" />


  <use x="600" y="400" href="#ventil"></use>
  <circle cx="600" cy="400" r="2" fill="tomato" />
  <use x="600" y="400" href="#antrieb-r"></use>
  <circle cx="600" cy="400" r="2" fill="tomato" />
</svg>